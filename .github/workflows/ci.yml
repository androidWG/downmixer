name: ci 
on:
  push:
    branches:
      - master 
      - main
permissions:
  contents: write
jobs:
  docs:
    name: Update docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
          cache: 'pipenv'
      - name: Install pipenv
        run: pip install pipenv
      - run: pipenv install --dev
      - uses: actions/cache@v2
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: mkdocs gh-deploy --force
